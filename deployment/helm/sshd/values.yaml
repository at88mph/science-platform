kubernetesClusterDomain: cluster.local

# Tell Kubernetes to spin up multiple instances.  Defaults to 1.
replicaCount: 1

# It's best to keep these set as such, unless you're willing to change these in several places.
skaha:
  namespace: skaha-system

# Skaha web service deployment
deployment:
  sshd:
    resources:
      requests:
        memory: "500Mi"
        cpu: "250m"
      limits:
        memory: "500Mi"
        cpu: "250m"

    # OpenID Configuration to obtain user information for accounts that will login to SSHD.
    # Accounts are expected to have a .ssh/authorizedKeys file in the /home/<username> folder.
    # oidc:
      # OIDC URL
      # url:
      
      # OIDC Client ID
      # clientID:

      # Kubernetes secret containing the client secret to avoid a copy and paste.
      # existingSecretName:

      # OIDC Client Secret, required if existingSecretName is missing.
      # clientSecret:

    # Legacy CADC ONLY login.
    # login:
      # username:
      # password:
      # uri: ivo://cadc.nrc.ca/gms

    # Name of the Traefik entrypoint to use.
    # entryPoint: sshd

    # The Resource ID of the Service that contains the Posix Mapping information
    # posixMapperResourceID: "ivo://example.org/posix-mapper"

    # The URL of the Registry to use
    # registryURL: https://example.org/reg

    filesystem:
      # RELATIVE path to the node/file content that could be mounted in other containers
      # MUST match the Cavern filesystem.subPath
      subPath: "cavern"

# Set these appropriately to match your Persistent Volume Claim labels.
storage:
  service:
    spec:
      # YAML for service mounted storage.
      # Example is the persistentVolumeClaim below.  Do not uncomment this
      # or Helm will use it as the default, even if a different spec
      # is specified.
      # persistentVolumeClaim:
      #   claimName: skaha-pvc
